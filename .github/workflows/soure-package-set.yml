name: 编译 K2 专用 IPK 包

on:
  workflow_dispatch:
    inputs:
      packages:
        description: '要编译的包名（空格分隔）'
        required: true
        default: 'luci-app-wireguard wireguard-tools zerotier luci-app-zerotier'

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出配置文件仓库
        uses: actions/checkout@v4
        with:
          # 直接检出 k2-openwrt-builder 仓库
          repository: 'mafei0825/k2-openwrt-builder'
          path: 'config-repo'

      - name: 下载 OpenWrt SDK
        run: |
          # 下载对应 K2 架构 (mipsel_24kc) 的 SDK
          wget https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/openwrt-sdk-23.05.5-ramips-mt7620_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk
          echo "✅ SDK 下载完成"

      - name: 配置 SDK 环境
        run: |
          cd sdk
          
          # 复制你的 .config 文件（包含所有16M闪存适配）
          cp ${{ github.workspace }}/config-repo/config-files/.config .config
          
          echo "✅ 已加载你的 .config 配置文件"
          
          # 如果需要编译第三方插件，可以添加 feeds 源
          echo 'src-git kenzo https://github.com/kenzok8/openwrt-packages' >> feeds.conf.default
          echo 'src-git small https://github.com/kenzok8/small' >> feeds.conf.default
          
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
      - name: 编译指定的 IPK 包
        run: |
          cd sdk
          
          # 将输入的包名按空格分割，逐个编译
          for pkg in ${{ github.event.inputs.packages }}; do
            echo "========================================="
            echo "正在编译: $pkg"
            echo "========================================="
            make package/$pkg/compile V=s || echo "⚠️ 包 $pkg 编译失败，继续下一个"
          done
          
      - name: 收集编译好的 IPK 文件
        run: |
          mkdir -p ipk-output
          # 查找所有编译出的 .ipk 文件
          find sdk/bin/packages -name "*.ipk" -exec cp {} ipk-output/ \;
          echo "✅ 共找到 $(ls ipk-output/*.ipk 2>/dev/null | wc -l) 个 IPK 文件"
          
      - name: 上传 IPK 包
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ipk-packages
          path: ipk-output/
          retention-days: 30
