name: 编译 K2 全功能 IPK 包集合

on:
  workflow_dispatch:
    inputs:
      custom_packages:
        description: '额外要编译的包名（可选，空格分隔）'
        required: false
        default: ''

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出配置文件仓库
        uses: actions/checkout@v4
        with:
          repository: 'mafei0825/k2-openwrt-builder'
          path: 'config-repo'

      - name: 下载 OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/openwrt-sdk-23.05.5-ramips-mt7620_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-23.05.5-ramips-mt7620_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
          mv $SDK_DIR sdk
          echo "✅ SDK 下载完成，目录：sdk"

      - name: 配置 SDK 环境
        run: |
          cd sdk
          cp ${{ github.workspace }}/config-repo/config-files/.config .config
          echo "✅ 已加载你的 .config 配置文件"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 诊断 feeds 状态
        run: |
          cd sdk
          echo "=== 当前 feeds 配置 ==="
          cat feeds.conf.default
          echo "=== 已安装的包列表（前20）==="
          ./scripts/feeds list -i | head -20
          echo "=== 搜索 luci-i18n-base-zh-cn ==="
          ./scripts/feeds list | grep luci-i18n-base-zh-cn || echo "❌ 未找到 luci-i18n-base-zh-cn"

      # ========== 编译所有包（保持原样）==========
      - name: 编译 LuCI 核心组件
        run: |
          cd sdk
          set +e
          echo "编译 LuCI 核心组件..."
          make package/luci/compile V=s
          make package/luci-base/compile V=s
          make package/luci-mod-admin-full/compile V=s
          make package/luci-theme-bootstrap/compile V=s
          set -e

      - name: 编译 LuCI 应用模块
        run: |
          cd sdk
          set +e
          echo "编译 LuCI 应用模块..."
          make package/luci-app-firewall/compile V=s
          make package/luci-app-opkg/compile V=s
          make package/luci-proto-ipv6/compile V=s
          make package/luci-proto-ppp/compile V=s
          make package/luci-mod-status/compile V=s
          make package/luci-mod-system/compile V=s
          make package/luci-mod-network/compile V=s
          set -e

      - name: 编译中文语言包
        run: |
          cd sdk
          set +e
          echo "编译中文语言包..."
          make package/luci-i18n-base-zh-cn/compile V=s || echo "⚠️ luci-i18n-base-zh-cn 编译失败，继续"
          make package/luci-i18n-firewall-zh-cn/compile V=s || echo "⚠️ luci-i18n-firewall-zh-cn 编译失败，继续"
          make package/luci-i18n-opkg-zh-cn/compile V=s || echo "⚠️ luci-i18n-opkg-zh-cn 编译失败，继续"
          set -e

      - name: 编译 WireGuard
        run: |
          cd sdk
          set +e
          echo "编译 WireGuard..."
          make package/kmod-wireguard/compile V=s || echo "⚠️ kmod-wireguard 编译失败，继续"
          make package/wireguard-tools/compile V=s || echo "⚠️ wireguard-tools 编译失败，继续"
          make package/luci-app-wireguard/compile V=s || echo "⚠️ luci-app-wireguard 编译失败，继续"
          make package/luci-i18n-wireguard-zh-cn/compile V=s || echo "⚠️ luci-i18n-wireguard-zh-cn 编译失败，继续"
          set -e

      - name: 编译 ZeroTier
        run: |
          cd sdk
          set +e
          echo "编译 ZeroTier..."
          make package/zerotier/compile V=s || echo "⚠️ zerotier 编译失败，继续"
          make package/luci-app-zerotier/compile V=s || echo "⚠️ luci-app-zerotier 编译失败，继续"
          make package/luci-i18n-zerotier-zh-cn/compile V=s || echo "⚠️ luci-i18n-zerotier-zh-cn 编译失败，继续"
          set -e

      - name: 编译 Web 服务器
        run: |
          cd sdk
          set +e
          echo "编译 Web 服务器..."
          make package/uhttpd/compile V=s
          make package/uhttpd-mod-ubus/compile V=s
          set -e

      - name: 编译基础服务工具
        run: |
          cd sdk
          set +e
          echo "编译基础服务工具..."
          make package/rpcd/compile V=s
          make package/rpcd-mod-file/compile V=s
          make package/rpcd-mod-luci/compile V=s
          make package/rpcd-mod-ucode/compile V=s
          make package/rpcd-mod-iwinfo/compile V=s
          make package/cgi-io/compile V=s
          set -e

      - name: 编译依赖库
        run: |
          cd sdk
          set +e
          echo "编译依赖库..."
          make package/liblucihttp0/compile V=s
          make package/liblucihttp-ucode/compile V=s
          make package/ucode-mod-math/compile V=s
          make package/ucode-mod-html/compile V=s
          make package/ucode-mod-fs/compile V=s
          make package/ucode-mod-nl80211/compile V=s
          make package/ucode-mod-rtnl/compile V=s
          make package/ucode-mod-ubus/compile V=s
          make package/ucode-mod-uci/compile V=s
          make package/ucode-mod-uloop/compile V=s
          set -e

      - name: 编译实用工具
        run: |
          cd sdk
          set +e
          echo "编译实用工具..."
          make package/htop/compile V=s
          make package/nano/compile V=s
          make package/iperf3/compile V=s
          make package/tcpdump/compile V=s
          make package/curl/compile V=s
          make package/wget/compile V=s
          make package/tar/compile V=s
          make package/unzip/compile V=s
          set -e

      - name: 编译额外自定义包
        if: github.event.inputs.custom_packages != ''
        run: |
          cd sdk
          set +e
          echo "编译额外自定义包..."
          for pkg in ${{ github.event.inputs.custom_packages }}; do
            echo "正在编译: $pkg"
            make package/$pkg/compile V=s || echo "⚠️ 包 $pkg 编译失败，继续下一个"
          done
          set -e

      # ========== 收集并重命名 IPK 文件，生成安装脚本 ==========
      - name: 收集 IPK 文件并生成安装脚本
        run: |
          mkdir -p ipk-output
          
          # 复制所有 IPK 文件到输出目录
          find sdk/bin/packages -name "*.ipk" -exec cp {} ipk-output/ \;
          cd ipk-output
          
          # 创建分类目录
          mkdir -p luci wireguard zerotier tools libs
          
          # 移动文件到对应目录
          mv *luci*.ipk luci/ 2>/dev/null || true
          mv *wireguard*.ipk wireguard/ 2>/dev/null || true
          mv *zerotier*.ipk zerotier/ 2>/dev/null || true
          mv *htop* *nano* *iperf* *tcpdump* *curl* *wget* *tar* *unzip* tools/ 2>/dev/null || true
          mv *lib*.ipk libs/ 2>/dev/null || true
          
          # 生成离线安装脚本
          cat > install.sh << 'EOF'
#!/bin/sh
# K2 OpenWrt 全功能包离线安装脚本
# 按依赖顺序自动安装所有包

# 设置颜色输出
RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
NC='\033[0m' # No Color

echo "========================================"
echo "K2 OpenWrt 全功能包离线安装"
echo "========================================"

# 获取脚本所在目录
SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
cd "$SCRIPT_DIR"

# 检查 opkg
if ! command -v opkg >/dev/null 2>&1; then
    echo "${RED}❌ 错误：opkg 命令不存在！${NC}"
    exit 1
fi

# 创建日志文件
LOG_FILE="/tmp/ipk_install_$(date +%Y%m%d_%H%M%S).log"
echo "安装日志：$LOG_FILE"

# 安装函数
install_dir() {
    local dir=$1
    local name=$2
    
    if [ ! -d "$dir" ]; then
        echo "${YELLOW}⚠️ 跳过 $name（目录不存在）${NC}"
        return
    fi
    
    cd "$dir"
    local count=$(ls *.ipk 2>/dev/null | wc -l)
    if [ "$count" -eq 0 ]; then
        echo "${YELLOW}⚠️ $name 目录中没有 IPK 文件${NC}"
        cd ..
        return
    fi
    
    echo "${GREEN}▶ 安装 $name...${NC}"
    for pkg in *.ipk; do
        echo "  正在安装: $pkg"
        opkg install "$pkg" >> "$LOG_FILE" 2>&1
        if [ $? -eq 0 ]; then
            echo "  ${GREEN}✅ $pkg 安装成功${NC}"
        else
            echo "  ${RED}❌ $pkg 安装失败${NC}"
        fi
    done
    cd ..
}

# 按依赖顺序安装
echo "${GREEN}开始按依赖顺序安装...${NC}"

install_dir "libs" "基础库"
install_dir "tools" "核心服务 (uhttpd等)"
install_dir "luci" "LuCI 基础组件"
install_dir "wireguard" "WireGuard"
install_dir "zerotier" "ZeroTier"
install_dir "tools" "实用工具"

# 检查 LuCI 服务
echo "${GREEN}▶ 检查服务状态...${NC}"
if [ -f /etc/init.d/uhttpd ]; then
    /etc/init.d/uhttpd enable
    /etc/init.d/uhttpd start
    echo "${GREEN}✅ uhttpd 服务已启动${NC}"
fi

if [ -f /etc/init.d/zerotier ]; then
    /etc/init.d/zerotier enable
    echo "${GREEN}✅ ZeroTier 已启用${NC}"
fi

echo "========================================"
echo "${GREEN}✅ 安装完成！${NC}"
echo "📝 安装日志：$LOG_FILE"
echo "🌐 Web 管理地址：http://192.168.1.1"
echo "========================================"
EOF

          chmod +x install.sh
          echo "✅ 已生成离线安装脚本 install.sh"

      - name: 上传 IPK 包和安装脚本
        uses: actions/upload-artifact@v4
        with:
          name: k2-full-ipk-packages
          path: ipk-output/
          retention-days: 30
