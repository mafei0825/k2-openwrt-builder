name: 编译 K2 全功能 IPK 包集合（基于推送的 .config）

on:
  workflow_dispatch:

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出配置文件仓库
        uses: actions/checkout@v4
        with:
          repository: 'mafei0825/k2-openwrt-builder'
          path: 'config-repo'

      - name: 下载 OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.4/targets/ramips/mt7620/openwrt-sdk-24.10.4-ramips-mt7620_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-24.10.4-ramips-mt7620_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
          mv $SDK_DIR sdk
          echo "✅ SDK 下载完成，目录：sdk"

      - name: 复制配置文件到 SDK
        run: |
          cp ${{ github.workspace }}/config-repo/config-files-24.10/.config sdk/.config
          cd sdk
          make defconfig
          echo "✅ .config 加载完成"

      - name: 添加第三方源（可选，如需 kenzo 可取消注释）
        run: |
          cd sdk
          # echo 'src-git kenzo https://github.com/kenzok8/openwrt-packages' >> feeds.conf.default
          # echo 'src-git small https://github.com/kenzok8/small' >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 下载源代码
        run: |
          cd sdk
          make download -j8

      - name: 编译所有选中的包
        run: |
          cd sdk
          make -j$(nproc) V=s

      - name: 收集 IPK 文件
        run: |
          mkdir -p ipk-output
          find sdk/bin/packages -name "*.ipk" -exec cp {} ipk-output/ \;
          cd ipk-output
          echo "✅ 共生成 $(ls *.ipk 2>/dev/null | wc -l) 个 IPK 文件"

      - name: 上传 IPK 包
        uses: actions/upload-artifact@v4
        with:
          name: k2-full-ipk-packages
          path: ipk-output/
          retention-days: 30
